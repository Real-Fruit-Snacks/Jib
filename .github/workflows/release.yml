name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── full builds (73 applets) ─────────────────────────
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            artifact: mainsail-linux-x64
            ext: ""
            features: full
          - target: x86_64-unknown-linux-musl
            os: ubuntu-22.04
            artifact: mainsail-linux-x64-musl
            ext: ""
            features: full
            apt: musl-tools
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            artifact: mainsail-linux-arm64
            ext: ""
            features: full
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: mainsail-macos-arm64
            ext: ""
            features: full
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: mainsail-windows-x64
            ext: ".exe"
            features: full
          - target: aarch64-pc-windows-msvc
            os: windows-11-arm
            artifact: mainsail-windows-arm64
            ext: ".exe"
            features: full
          # ── slim builds (34 applets — POSIX coreutils) ───────
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            artifact: mainsail-linux-x64-slim
            ext: ""
            features: slim
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            artifact: mainsail-linux-arm64-slim
            ext: ""
            features: slim
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: mainsail-macos-arm64-slim
            ext: ""
            features: slim
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: mainsail-windows-x64-slim
            ext: ".exe"
            features: slim
          - target: aarch64-pc-windows-msvc
            os: windows-11-arm
            artifact: mainsail-windows-arm64-slim
            ext: ".exe"
            features: slim
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}-${{ matrix.features }}
      - name: Install apt packages
        if: matrix.apt
        run: sudo apt-get install -y ${{ matrix.apt }}
      - name: Build (full)
        if: matrix.features == 'full'
        run: cargo build --release --target ${{ matrix.target }}
      - name: Build (slim)
        if: matrix.features == 'slim'
        run: cargo build --release --target ${{ matrix.target }} --no-default-features --features slim
      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/mainsail${{ matrix.ext }}" "dist/${{ matrix.artifact }}${{ matrix.ext }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}${{ matrix.ext }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Flatten
        run: |
          mkdir -p dist
          find artifacts -type f -exec cp {} dist/ \;
          ls -la dist
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
